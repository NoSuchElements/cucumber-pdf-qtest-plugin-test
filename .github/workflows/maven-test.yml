name: Cucumber Tests with PDF Reports

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: 'maven'
    
    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    
    - name: Install cucumber-pdf-qtest-plugin
      run: |
        git clone https://github.com/NoSuchElements/cucumber-pdf-qtest-plugin.git
        cd cucumber-pdf-qtest-plugin
        mvn clean install -DskipTests
        cd ..
    
    - name: Run tests with Maven
      run: mvn clean verify
      continue-on-error: true
    
    - name: Upload PDF Reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: cucumber-pdf-reports
        path: target/pdf-reports/*.pdf
        retention-days: 30
    
    - name: Upload Cucumber JSON Report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: cucumber-json-report
        path: target/cucumber-json.json
        retention-days: 30
    
    - name: List generated PDFs
      if: always()
      run: |
        echo "Generated PDF reports:"
        ls -lh target/pdf-reports/*.pdf || echo "No PDFs found"
        echo ""
        echo "Total PDFs generated: $(ls target/pdf-reports/*.pdf 2>/dev/null | wc -l)"
